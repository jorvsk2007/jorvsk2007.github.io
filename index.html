<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Papelería DB - Sistema de Gestión</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo">papeleria_db</div>
        <div class="user-area" id="user-area">
            <button onclick="mostrarLogin()" id="btn-login-main">Iniciar Sesión</button>
            <div id="user-profile" class="hidden">
                <span id="user-name">Usuario</span>
                <div class="dropdown">
                    <button onclick="logout()">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </header>

    <nav class="nav-bar" id="nav-bar">
        <button onclick="navegar('ventas')">Ventas</button>
        <button onclick="navegar('productos')">Productos</button>
        <button onclick="navegar('inventario')">Inventario</button>
    </nav>

    <main id="app-content">
        <div class="welcome-screen">
            <h1>Bienvenido al Sistema</h1>
            <p>Por favor, inicie sesión para comenzar.</p>
        </div>
    </main>

    <div id="modal-busqueda" class="modal hidden">
        <div class="modal-content large">
            <h2>Buscar Producto</h2>
            <input type="text" id="input-busqueda" placeholder="Escribe nombre del producto..." oninput="buscarProductos(this.value)">
            <div class="table-container">
                <table id="tabla-resultados">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="body-resultados"></tbody>
                </table>
            </div>
            <button class="btn-close" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
