<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Papelería</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f6f8;
}

header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#34495e;
color:white;
padding-top:20px;
}

.sidebar button{
width:100%;
padding:15px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
font-size:15px;
}

.sidebar button:hover{
background:#2c3e50;
}

.content{
flex:1;
padding:30px;
}

.section{
display:none;
}

.section.active{
display:block;
}

input, select{
padding:8px;
margin:5px;
}

button.action{
background:#3498db;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:4px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

table, th, td{
border:1px solid #ccc;
}

th, td{
padding:10px;
text-align:left;
}

th{
background:#ecf0f1;
}

</style>
</head>

<body>

<header>
<h1>Sistema de Gestión - Papelería</h1>
</header>

<div class="container">

<div class="sidebar">

<button onclick="mostrar('productos')">Productos</button>
<button onclick="mostrar('proveedores')">Proveedores</button>
<button onclick="mostrar('trabajadores')">Trabajadores</button>
<button onclick="mostrar('ventas')">Ventas</button>
<button onclick="mostrar('detalle')">Detalle Venta</button>

</div>

<div class="content">

<!-- PRODUCTOS -->
<div id="productos" class="section active">

<h2>Productos</h2>

<input placeholder="Nombre producto">
<input placeholder="Precio">
<input placeholder="Stock">

<button class="action">Guardar</button>

<table>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Precio</th>
<th>Stock</th>
</tr>
</table>

</div>

<!-- PROVEEDORES -->
<div id="proveedores" class="section">

<h2>Proveedores</h2>

<input placeholder="Nombre proveedor">
<input placeholder="Teléfono">
<input placeholder="Correo">

<button class="action">Guardar</button>

<table>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Teléfono</th>
<th>Correo</th>
</tr>
</table>

</div>

<!-- TRABAJADORES -->
<div id="trabajadores" class="section">

<h2>Trabajadores</h2>

<input placeholder="Nombre trabajador">
<input placeholder="Puesto">
<input placeholder="Teléfono">

<button class="action">Guardar</button>

<table>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Puesto</th>
<th>Teléfono</th>
</tr>
</table>

</div>

<!-- VENTAS -->
<div id="ventas" class="section">

<h2>Ventas</h2>

<input placeholder="ID Trabajador">
<input placeholder="Fecha">

<button class="action">Registrar Venta</button>

<table>
<tr>
<th>ID Venta</th>
<th>Trabajador</th>
<th>Fecha</th>
</tr>
</table>

</div>

<!-- DETALLE VENTA -->
<div id="detalle" class="section">

<h2>Detalle de Venta</h2>

<input placeholder="ID Venta">
<input placeholder="ID Producto">
<input placeholder="Cantidad">

<button class="action">Agregar Producto</button>

<table>
<tr>
<th>ID Venta</th>
<th>Producto</th>
<th>Cantidad</th>
</tr>
</table>

</div>

</div>
</div>

<script>

function mostrar(seccion){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(seccion).classList.add("active")

}

</script>

</body>
</html>
