<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Papelería DB - Sistema de Gestión</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo">papeleria_db</div>
        <div id="user-controls">
            <button onclick="abrirLogin()" id="btn-login-header">Iniciar Sesión</button>
            <div id="user-info" class="hidden">
                <span id="display-user-name"></span>
                <button onclick="cerrarSesion()" class="btn-logout">Salir</button>
            </div>
        </div>
    </header>

    <nav class="nav-bar hidden" id="main-nav">
        <button onclick="irAVentas()">🛒 Ventas</button>
        <button onclick="irAProductos()">📦 Productos</button>
    </nav>

    <main id="app-view">
        <div class="welcome">
            <h1>Bienvenido al Sistema</h1>
            <p>Inicie sesión con su CURP para continuar.</p>
        </div>
    </main>

    <div id="modal-login" class="modal hidden">
        <div class="modal-content">
            <h2>Acceso</h2>
            <input type="text" id="input-curp" placeholder="Ingresa tu CURP">
            <button class="primary-btn" onclick="ejecutarLogin()">Entrar</button>
            <button onclick="cerrarLogin()" class="btn-text">Cancelar</button>
            <p id="error-login" class="error hidden">Usuario no encontrado</p>
        </div>
    </div>

    <div id="modal-busqueda" class="modal hidden">
        <div class="modal-content large">
            <h3>Buscar Producto</h3>
            <input type="text" placeholder="Filtrar por nombre..." oninput="filtrarProductos(this.value)">
            <table>
                <thead>
                    <tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th></th></tr>
                </thead>
                <tbody id="lista-busqueda"></tbody>
            </table>
            <button onclick="cerrarBuscador()">Cerrar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
